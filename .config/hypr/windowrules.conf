# Add transparency to some windows
windowrule {
  name = windowrule-65
  opacity = 0.9
  match:class = ^(Spotify)$
}


# Window rules for xwaylandvideobridge
windowrule {
  name = windowrule-66
  opacity = 0.0 override 0.0 override
  no_anim = on
  no_initial_focus = on
  max_size = 1 1
  no_blur = on
  match:class = ^(xwaylandvideobridge)$
}


